<!DOCTYPE html>
<html lang="es">
<head>

    <title>NERV OS - EVA Unit 01</title>
    <link rel="stylesheet" href="../styles/styles.css">

<body>
    <div class="phone-container list-screen profile-screen eva-profile-screen">
        <header class="list-header">
            <div class="nerv-title">
                <div class="nerv-icon"></div>
                <span class="nerv-title-text">NERV SYSTEMS</span>
            </div>
            <a class="cross" href="loading.html?next=evas.html" aria-label="Volver a evas"></a>
        </header>

        <main class="list-content eva-profile-content">
            <h1>EVA UNIT 01</h1>
            <h2>&#12456;&#12532;&#12449;&#21021;&#21495;&#27231;</h2>

            <section class="eva-identity" aria-label="Identidad de unidad EVA">
                <strong>01</strong>
                <div>
                    <h3>TEST TYPE EVA</h3>
                    <p>&#35430;&#39443;&#12479;&#12452;&#12503; EVA</p>
                </div>

            <section class="eva-status" aria-label="Estado de unidad EVA">
                <p>STATUS</p>
                <strong>STANDBY</strong>
                <span>&#24453;&#27231;&#12377;&#12427;</span>

            <img class="eva-watermark" src="../imgs/NervLogoSup.png" alt="" aria-hidden="true">

            <section class="eva-visual eva-empty-visual" aria-label="Imagen de EVA Unit 01 pendiente"></section>

            <a class="edit-button eva-edit-button" href="loading.html?next=evas.html">EDIT</a>

            <section class="data-panel eva-spec-panel" aria-label="Especificaciones de EVA">
                <h3>Specifications<br><span>&#20181;&#27096;</span></h3>
                <dl>
                    <div><dt>Height</dt><dd>40.72 M</dd></div>
                    <div><dt>Weight</dt><dd>58.822 T</dd></div>
                    <div><dt>Power Source</dt><dd>S<sup>2</sup> Engine</dd></div>
                    <div><dt>Pilot</dt><dd>Shinji Ikari</dd></div>
                </dl>
            </section>
        </main>

        <nav class="bottom-nav" aria-label="Main navigation">
